<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dokumen Perjalanan</title>
    <link rel="stylesheet" href="utama.css">
</head>
<body>

    <!-- IREBASE COMPAT (WAJIB) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="logo.jpg">
    </div>
    <div class="title">
        <h1>SIDOKIN</h1>
        <p>Sistem Informasi Dokumen Keimigrasian</p>
    </div>
</div>

<!-- CONTAINER -->
<div class="container">

    <!-- SEARCH & BUTTON -->
    <div class="top-bar">
        <button class="searching"> <span class="icon">🔍</span></button>
        <div class="search-box">
        <input type="text" id="search" placeholder="Search" onkeyup="applyFilter()">
        </div>
        <button class="btn-tambah" onclick="window.location.href='input.html'">+ Tambah</button>
    </div>
    
<!-- TABLE -->
<div class="table-box">

    <!-- HEADER TABLE -->
    <div class="table-header">
        <span>Tanggal</span>
        <span>Judul</span>
        <span>Kantor</span>
    </div>

    <!-- DATA DARI FIREBASE -->
    <div id="listData"></div>

</div>

</div>

</body>
</html>
